name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  CONFIGURATION: Release

jobs:
  build-test-pack:
    name: Build, test, and pack
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore SaltyMilky.Net.slnx

      - name: Build
        run: dotnet build SaltyMilky.Net.slnx --configuration $env:CONFIGURATION --no-restore

      - name: Test
        run: dotnet test SaltyMilky.Net.slnx --configuration $env:CONFIGURATION --no-build

      - name: Native AOT smoke
        run: dotnet publish SaltyMilky.Net.NativeAotSmoke/SaltyMilky.Net.NativeAotSmoke.csproj --configuration $env:CONFIGURATION --runtime win-x64 --no-restore

      - name: Pack
        run: dotnet pack SaltyMilky.Net/SaltyMilky.Net.csproj --configuration $env:CONFIGURATION --no-build --output artifacts/packages

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/packages/*.nupkg

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push "artifacts/packages/*.nupkg" --api-key "${{ secrets.NUGET_APIKEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
